name: kokoro-privacy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the public package in an isolated home
        run: |
          export KOKORO_CLAUDE_HOME="$RUNNER_TEMP/.claude"
          export KOKORO_CODEX_HOME="$RUNNER_TEMP/.codex"
          bash install/install.sh
          python3 "$KOKORO_CLAUDE_HOME/kokoro/runtime/kokoro.py" doctor
      - name: Reject sensitive files in the public artifact
        run: |
          ! find . -path './.git' -prune -o \( -name '.env*' -o -name 'client_secret_*.json' -o -name '*.csv' -o -name '*.xlsx' \) -type f -print | grep .

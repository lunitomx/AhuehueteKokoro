story: 'S40.3'
epic: 'E40'
content:
  summary: 'Define the shared Kokoro orchestrator contract so future operating runs use consistent phases, gates, fallbacks, output format, privacy rules, and permission boundaries.'
  complexity: moderate
  acceptance_criteria:
    - id: AC1
      description: 'Shared contract defines phases, gates, output format, and permission boundaries.'
      verifiable: true
    - id: AC2
      description: 'Gate names and statuses are business-readable.'
      verifiable: true
    - id: AC3
      description: 'Data-backed runs require MCP and privacy gates plus graceful fallback.'
      verifiable: true
    - id: AC4
      description: 'Actions require explicit invitation before mutation.'
      verifiable: true
  integration_points:
    - module: 'kokoro orchestrator contract knowledge'
      change_type: new
      files: ['.claude/knowledge/kokoro-orchestrator-contract.md']
    - module: 'kokoro executive router knowledge'
      change_type: modification
      files: ['.claude/knowledge/kokoro-executive-router.md']
  decisions:
    - id: D1
      choice: 'Implement the contract as a knowledge file, not as command stubs.'
      rationale: 'S40.3 defines reusable policy; specific commands ship in later stories.'
      alternatives_considered: ['Create empty orchestrator commands', 'Embed contract only in E40 design']
    - id: D2
      choice: 'Use business-readable gate statuses: Pass, Partial, Blocked, Skipped.'
      rationale: 'Operators need to understand what happened without reading implementation details.'
      alternatives_considered: ['Boolean pass/fail only', 'Technical status codes']

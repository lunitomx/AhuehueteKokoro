artifact_type: story-design
version: 1
skill: rai-story-design
created: '2026-06-06T02:15:28Z'
story: 'S40.6'
epic: 'E40'
content:
  summary: 'Create a creative campaign operating run that turns visual asset requests into strategy, true promise, storyboard, visual direction, generation specs, review, Meta copy, and permission gates.'
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: 'The run clarifies objective, true promise, audience, event/offer reality, and brand non-negotiables before production.'
      verifiable: true
    - id: AC2
      description: 'The run defines and requires approval of a frame-by-frame story arc before asset generation.'
      verifiable: true
    - id: AC3
      description: 'The run requires visual attention direction for every frame before generation specs.'
      verifiable: true
    - id: AC4
      description: 'The run requires creative review before Meta copy, targeting, publishing, or asset persistence.'
      verifiable: true
    - id: AC5
      description: 'The run uses public-safe examples and explicit permission boundaries for generated/private assets.'
      verifiable: true
  integration_points:
    - module: '.claude.commands'
      change_type: new
      files: ['.claude/commands/kokoro-creative-campaign-run.md']
    - module: '.claude.knowledge'
      change_type: modification
      files: ['.claude/knowledge/kokoro-executive-router.md']
    - module: 'work.epics.e40'
      change_type: new
      files:
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.6-design.md'
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.6-plan.md'
  decisions:
    - id: D1
      choice: 'Create a new creative campaign run instead of expanding kokoro-creative.'
      rationale: 'kokoro-creative generates assets; the new run orchestrates strategic promise, storyboard, visual direction, review, and permission gates before generation.'
      alternatives_considered: ['Modify kokoro-creative directly', 'Only add guidance to router']
    - id: D2
      choice: 'Treat carousel as a decision journey.'
      rationale: 'The user example showed that attractive slides fail if they do not move one thought to the next.'
      alternatives_considered: ['Generate five independent images', 'Only produce copy/headlines']
    - id: D3
      choice: 'Make generation and persistence permission-gated.'
      rationale: 'Generated specs and assets can contain private guest details and must not land in the public repo without explicit invitation and ignored paths.'
      alternatives_considered: ['Auto-save specs', 'Commit public examples with real context']

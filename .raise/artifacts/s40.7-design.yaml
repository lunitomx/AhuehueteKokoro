created: '2026-06-06T02:38:28Z'
story: 'S40.7'
epic: 'E40'
content:
  summary: 'Create a launch operating run that sequences business model clarity, customer forces, PESCAR, experiment validation, launch assets, landing, tracking, and weekly readback before publication.'
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: 'The run verifies launch readiness before generating launch assets.'
      verifiable: true
    - id: AC2
      description: 'The run chains canvas, forces, PESCAR, experiment, launch, landing, tracking, and weekly marketing readback in order.'
      verifiable: true
    - id: AC3
      description: 'The run separates validated facts, assumptions, blockers, and what not to touch yet.'
      verifiable: true
    - id: AC4
      description: 'The run includes primary metric, thresholds, tracking plan, and weekly readback path.'
      verifiable: true
    - id: AC5
      description: 'The run asks explicit permission before saving private artifacts, publishing, editing landings, creating campaigns, or changing tracking.'
      verifiable: true
  integration_points:
    - module: '.claude.commands'
      change_type: new
      files: ['.claude/commands/kokoro-launch-run.md']
    - module: '.claude.knowledge'
      change_type: modification
      files: ['.claude/knowledge/kokoro-executive-router.md']
    - module: 'work.epics.e40'
      change_type: new
      files:
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.7-design.md'
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.7-plan.md'
  decisions:
    - id: D1
      choice: 'Create a launch run instead of expanding kokoro-launch.'
      rationale: 'kokoro-launch creates launch assets; the run determines whether the creation is ready and which upstream methods are required first.'
      alternatives_considered: ['Modify kokoro-launch directly', 'Route users to tactical skills manually']
    - id: D2
      choice: 'Treat validation and tracking as launch gates.'
      rationale: 'A launch without thresholds or tracking cannot produce learning, only activity.'
      alternatives_considered: ['Make validation optional', 'Assume tracking can be fixed later']
    - id: D3
      choice: 'Use a preparation path when readiness is blocked.'
      rationale: 'The run should still create value by sequencing the next missing step instead of pretending the launch is ready.'
      alternatives_considered: ['Block without next step', 'Proceed with low confidence']

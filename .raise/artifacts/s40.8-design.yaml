story: 'S40.8'
epic: 'E40'
content:
  summary: 'Create an acquisition operating run that diagnoses bottlenecks across Customer Factory, Funnel Consciente, Oferta Mafia, landing, analytics, tracking, and executive readback before recommending more traffic or campaign changes.'
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: 'The run classifies acquisition as a system diagnosis before channel recommendations.'
      verifiable: true
    - id: AC2
      description: 'The run maps Customer Factory and Funnel stages to locate the active bottleneck.'
      verifiable: true
    - id: AC3
      description: 'The run verifies MCP/platform, landing, CRM/follow-up, and tracking gates before data-backed claims.'
      verifiable: true
    - id: AC4
      description: 'The run includes offer, landing, CTA, proof, friction, and follow-up review.'
      verifiable: true
    - id: AC5
      description: 'The run asks explicit permission before mutating campaigns, landings, tracking, CRM, assets, or private files.'
      verifiable: true
  integration_points:
    - module: '.claude.commands'
      change_type: new
      files: ['.claude/commands/kokoro-acquisition-run.md']
    - module: '.claude.knowledge'
      change_type: modification
      files: ['.claude/knowledge/kokoro-executive-router.md']
    - module: 'work.epics.e40'
      change_type: new
      files:
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.8-design.md'
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.8-plan.md'
  decisions:
    - id: D1
      choice: 'Create acquisition run instead of expanding funnel or analytics.'
      rationale: 'Acquisition failures often sit between platform data, offer, landing, sales follow-up, and tracking. A tactical skill alone would overfit to one surface.'
      alternatives_considered: ['Expand kokoro-funnel', 'Expand kokoro-analytics', 'Route manually through existing skills']
    - id: D2
      choice: 'Diagnose bottleneck before recommending more traffic.'
      rationale: 'More investment is harmful if activation, CTA, tracking, offer, or follow-up is the constraint.'
      alternatives_considered: ['Recommend channel optimization first', 'Start from paid media only']
    - id: D3
      choice: 'Include CRM/follow-up visibility as a gate.'
      rationale: 'A sales and marketing leader needs to know whether demand becomes conversations and revenue, not just clicks or forms.'
      alternatives_considered: ['Limit to ads and landing', 'Assume CRM data is private and skip it entirely']

created: '2026-06-08T06:01:58Z'
story: 'S40.9'
epic: 'E40'
content:
  summary: 'Align runtime documentation for Claude, Codex, and Hermes, create the /kokoro-share-readiness command, and add final public-share checklist coverage for Kokoro operating runs.'
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: 'README accurately explains runtime loading differences and does not overpromise Codex slash command loading.'
      verifiable: true
    - id: AC2
      description: '/kokoro-share-readiness exists and applies privacy and share-readiness checks.'
      verifiable: true
    - id: AC3
      description: 'Executive router and /kokoro examples mark share readiness and completed E40 routes as available.'
      verifiable: true
    - id: AC4
      description: 'Docs include a concise final checklist for runtime loading, MCP boundaries, private workspace boundaries, gates, and demo path.'
      verifiable: true
    - id: AC5
      description: 'Verification shows no credentials, real guest data, private reports, generated private assets, or account mappings were introduced.'
      verifiable: true
  integration_points:
    - module: '.claude.commands'
      change_type: new
      files: ['.claude/commands/kokoro-share-readiness.md']
    - module: '.claude.commands'
      change_type: modification
      files: ['.claude/commands/kokoro.md']
    - module: '.claude.knowledge'
      change_type: modification
      files: ['.claude/knowledge/kokoro-executive-router.md']
    - module: 'root_docs'
      change_type: modification
      files: ['README.md', 'AGENTS.md']
    - module: 'work.epics.e40'
      change_type: new
      files:
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.9-design.md'
        - 'work/epics/e40-kokoro-operability-orchestrators/stories/s40.9-plan.md'
  decisions:
    - id: D1
      choice: 'Create a share-readiness command instead of leaving only a knowledge checklist.'
      rationale: 'The executive router needs an available route that a business user can invoke directly before sharing Kokoro.'
      alternatives_considered: ['Keep checklist as knowledge only', 'Place checklist only in README']
    - id: D2
      choice: 'Correct README runtime claims rather than adding caveats in AGENTS only.'
      rationale: 'README is the first public installation surface, so it must not overpromise Codex behavior.'
      alternatives_considered: ['Leave README optimistic', 'Move all runtime notes to AGENTS']
    - id: D3
      choice: 'Include no-MCP demo path.'
      rationale: 'Kokoro should be shareable even when platform connectors are not installed; orchestrators can still demonstrate methodology with data gates blocked or skipped.'
      alternatives_considered: ['Require MCPs for demos', 'Hide MCP limitations']
